<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>NetOpsKube Login</title>

<style>

* {
    box-sizing: border-box;
}

body {
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
    height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
}

.login-container {
    background:white;
    padding:40px;
    width:410px;
    border-radius:10px;
    box-shadow:0 15px 40px rgba(0,0,0,0.3);
    text-align:center;
}

.logo {
    width:160px;
    margin-bottom:15px;
}

h2 {
    margin-bottom:20px;
    color:#1b3c59;
}

input {
    width:100%;
    padding:10px;
    margin:10px 0;
    border-radius:5px;
    border:1px solid #ccc;
}

/* modern focus highlight */
input:focus {
    outline:none;
    border:1px solid #1f6feb;
    box-shadow:0 0 5px rgba(31,111,235,0.5);
}

.password-wrapper {
    position:relative;
    width:100%;
}

.password-wrapper input {
    width:100%;
}

.toggle-password {
    position:absolute;
    right:10px;
    top:12px;
    cursor:pointer;
}

button {
    width:100%;
    padding:12px;
    background:#1f6feb;
    color:white;
    border:none;
    border-radius:5px;
    font-size:16px;
    cursor:pointer;
}

button:hover {
    background:#0d4fb8;
}

.footer {
    margin-top:15px;
    font-size:12px;
    color:#888;
}
.error-message {
    color:#d93025;
    font-size:14px;
    margin-top:5px;
    margin-bottom:10px;
    display:none;
}

</style>
</head>
